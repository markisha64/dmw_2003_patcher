name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches:
      - main
  workflow_dispatch:  


env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential ninja-build libgdk3.0-cil libatk1.0-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf2.0-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libxdo-dev
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo
          target
        key: linux-cargo-${{ hashFiles('Cargo.lock') }}
        restore-keys: linux-cargo-${{ hashFiles('Cargo.lock') }}
    - name: Get binstall
      run: cargo install cargo-binstall
    - name: Get cli tool
      run: cargo binstall dioxus-cli@0.7.4
    - name: Build mkpsxiso
      run: |
        cmake --preset release -S ./mkpsxiso -B ./mkpsxiso/build
        cmake --build ./mkpsxiso/build --config Release
    - name: Prepare external bin
      run: |
        mkdir external_bin
        cp mkpsxiso/build/Release/mkpsxiso external_bin/
        cp mkpsxiso/build/Release/dumpsxiso external_bin/
    - name: Build
      run: dx bundle --release --package-types appimage
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        path: dist/*
  
  build-windows:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Cache
      uses: actions/cache@v4
      with:
        path: |
          $HOME/.cargo
          target
        key: windows-cargo-${{ hashFiles('Cargo.lock') }}
        restore-keys: windows-cargo-${{ hashFiles('Cargo.lock') }}
    - name: Get binstall
      run: cargo install cargo-binstall
    - name: Get cli tool
      run: cargo binstall dioxus-cli@0.7.4
    - name: Build mkpsxiso
      run: |
        cmake --preset release -S ./mkpsxiso -B ./mkpsxiso/build -G "Visual Studio 17 2022"
        cmake --build ./mkpsxiso/build --config Release
    - name: Prepare external bin
      run: |
        mkdir external_bin
        xcopy target\release\*.exe artifact\
    - name: Build
      run: dx bundle --release --package-types msi
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        path: dist/*

  create-release:
    name:    Create release
    runs-on: ubuntu-latest
    needs:   [ build-windows, build-linux ]
  
    steps:
    - name: Fetch build artifacts
      if:   ${{ github.ref_type == 'tag' }}
      uses: actions/download-artifact@v4
      with:
        path: .
  
    - name: Publish release
      if:   ${{ github.ref_type == 'tag' }}
      uses: softprops/action-gh-release@v2
      with:
        fail_on_unmatched_files: true
        files: dist/*
